services:
  - type: web
    name: senyra-backend
    runtime: python
    plan: free
    region: oregon

    buildCommand: python -m pip install --upgrade pip && pip install -r backend/requirements.txt

    startCommand: python backend/seed_users.py && python -m uvicorn backend.main:app --host 0.0.0.0 --port $PORT

    healthCheckPath: /health

    envVars:
      - key: PYTHON_VERSION
        value: 3.12.7

      - key: ENVIRONMENT
        value: production

      - key: JWT_SECRET_KEY
        sync: false

      - key: DATABASE_URL
        sync: false

      - key: CORS_ORIGINS
        sync: false

      - key: JWT_ALGORITHM
        value: HS256

      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "1440"
